name: Generate Blog Posts

on:
  schedule:
    - cron: '30 0 * * *'  # Daily at 00:30 UTC (30 min after data collection)
  workflow_dispatch:        # Manual trigger from GitHub UI

concurrency:
  group: content-pipeline
  cancel-in-progress: false  # Never cancel a blog generation run

jobs:
  generate:
    name: Generate MDX Blog Posts
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests==2.31.0 feedparser==6.0.11

      - name: Ensure output directories exist
        run: |
          mkdir -p public/blog
          mkdir -p public/data
          mkdir -p public/report

      - name: Verify trends.json is fresh
        run: |
          if [ ! -f public/data/trends.json ]; then
            echo "❌ trends.json not found — running data collection first"
            pip install requests feedparser
            python scripts/collect_trends.py
          fi

          # Check data freshness (warn if older than 3 hours)
          python3 - <<'EOF'
          import json
          from datetime import datetime, timezone, timedelta

          with open("public/data/trends.json") as f:
              data = json.load(f)

          last_updated = data.get("lastUpdated", "")
          if last_updated:
              dt = datetime.fromisoformat(last_updated.replace("Z", "+00:00"))
              age_hours = (datetime.now(timezone.utc) - dt).total_seconds() / 3600
              print(f"Data age: {age_hours:.1f} hours")
              if age_hours > 3:
                  print("::warning::trends.json is more than 3 hours old — consider running collect-data workflow first")
              else:
                  print("✅ Data is fresh")
          EOF

      - name: Run blog generation
        run: |
          echo "=== Starting blog post generation ==="
          python scripts/generate_blog.py
          echo "=== Blog generation complete ==="

      - name: Count new posts
        run: |
          NEW_MDX=$(git status --short public/blog/ | grep -c "^?" 2>/dev/null || echo 0)
          echo "New MDX files: $NEW_MDX"

          if [ -f public/data/posts-index.json ]; then
            python3 -c "
          import json
          idx = json.load(open('public/data/posts-index.json'))
          print(f\"Total posts in index: {len(idx.get('posts', []))}\")
            "
          fi

      - name: Regenerate sitemap and RSS after blog update
        run: |
          python3 - <<'EOF'
          import json, sys
          from datetime import datetime, timezone
          from pathlib import Path

          BASE_DIR = Path('.')
          SITE_URL = 'https://global-trend-map-web.vercel.app'
          SITEMAP_FILE = BASE_DIR / 'public' / 'sitemap.xml'
          TRENDS_FILE = BASE_DIR / 'public' / 'data' / 'trends.json'
          INDEX_FILE = BASE_DIR / 'public' / 'data' / 'posts-index.json'

          def url(loc, lastmod, changefreq, priority):
              return f'  <url>\n    <loc>{loc}</loc>\n    <lastmod>{lastmod}</lastmod>\n    <changefreq>{changefreq}</changefreq>\n    <priority>{priority}</priority>\n  </url>'

          today = datetime.now(timezone.utc).strftime('%Y-%m-%dT00:00:00Z')
          static_pages = [
              (SITE_URL, 'hourly', '1.0'),
              (f'{SITE_URL}/blog', 'hourly', '0.9'),
              (f'{SITE_URL}/about', 'monthly', '0.7'),
              (f'{SITE_URL}/contact', 'monthly', '0.6'),
              (f'{SITE_URL}/privacy-policy', 'yearly', '0.3'),
              (f'{SITE_URL}/terms', 'yearly', '0.3'),
              (f'{SITE_URL}/cookie-policy', 'yearly', '0.3'),
              (f'{SITE_URL}/dmca', 'yearly', '0.2'),
              (f'{SITE_URL}/disclaimer', 'yearly', '0.2'),
              (f'{SITE_URL}/editorial-policy', 'yearly', '0.3'),
          ]

          urls = [url(loc, today, freq, prio) for loc, freq, prio in static_pages]

          try:
              raw = json.loads(INDEX_FILE.read_text(encoding='utf-8'))
              posts = raw.get('posts', raw) if isinstance(raw, dict) else raw
              for p in posts:
                  if p.get('language', 'en') == 'en':
                      urls.append(url(f"{SITE_URL}/blog/{p['slug']}", p.get('date', today), 'weekly', '0.8'))
          except Exception as e:
              print(f'Warning: could not read posts-index: {e}')

          try:
              trends = json.loads(TRENDS_FILE.read_text(encoding='utf-8'))
              for code in trends.get('countries', {}):
                  urls.append(url(f'{SITE_URL}/country/{code.lower()}', today, 'hourly', '0.85'))
          except Exception as e:
              print(f'Warning: could not read trends: {e}')

          xml = '\n'.join(['<?xml version="1.0" encoding="UTF-8"?>', '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">', *urls, '</urlset>'])
          SITEMAP_FILE.write_text(xml, encoding='utf-8')
          print(f'Sitemap updated: {len(urls)} URLs')

          # RSS feed
          from email.utils import formatdate
          import calendar
          RSS_FILE = BASE_DIR / 'public' / 'rss.xml'
          def rfc822(d):
              try:
                  dt = __import__('datetime').datetime.fromisoformat(d.replace('Z','+00:00'))
              except Exception:
                  dt = __import__('datetime').datetime.now(__import__('datetime').timezone.utc)
              return formatdate(calendar.timegm(dt.timetuple()), usegmt=True)
          def esc(s): return s.replace('&','&amp;').replace('<','&lt;').replace('>','&gt;')
          en_posts = sorted([p for p in posts if p.get('language','en')=='en'], key=lambda p: p.get('date',''), reverse=True)[:20]
          items = []
          for p in en_posts:
              slug = p.get('slug','')
              link = f"{SITE_URL}/blog/{slug}"
              items.append(f"    <item>\n      <title>{esc(p.get('title',slug))}</title>\n      <link>{link}</link>\n      <description>{esc(p.get('description',p.get('excerpt',slug)))}</description>\n      <pubDate>{rfc822(p.get('date',today))}</pubDate>\n      <guid isPermaLink=\"true\">{link}</guid>\n    </item>")
          rss = '\n'.join(['<?xml version="1.0" encoding="UTF-8"?>','<rss version="2.0" xmlns:atom="http://www.w3.org/2005/Atom">','  <channel>',f'    <title>Global Trend Map — World Trending Topics</title>',f'    <link>{SITE_URL}</link>','    <description>Real-time global trend analysis across 40+ countries. Hourly updates.</description>','    <language>en-us</language>',f'    <lastBuildDate>{formatdate(usegmt=True)}</lastBuildDate>',f'    <atom:link href="{SITE_URL}/rss.xml" rel="self" type="application/rss+xml"/>',*items,'  </channel>','</rss>'])
          RSS_FILE.write_text(rss, encoding='utf-8')
          print(f'RSS feed updated: {len(items)} items')
          EOF

      - name: Commit and push generated blog posts
        run: |
          git config user.name "Vercel Manager Bot"
          git config user.email "hsr815815@gmail.com"
          git add public/blog/
          git add public/data/posts-index.json
          git add public/data/trends.json
          git add public/sitemap.xml 2>/dev/null || true
          git add public/rss.xml 2>/dev/null || true
          git diff --staged --quiet || git commit -m "📝 Auto: Generate blog posts $(date -u '+%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Submit URLs to search engines
        run: |
          SITE_URL="https://global-trend-map-web.vercel.app"
          SITEMAP_URL="${SITE_URL}/sitemap.xml"
          INDEXNOW_KEY="7f3a2b9c4e1d8f6a5c2b0e7d4f9a1c3e"

          # 1. Google Sitemap ping
          echo "=== Pinging Google with sitemap ==="
          curl -s --max-time 10 "https://www.google.com/ping?sitemap=${SITEMAP_URL}" || echo "Google ping failed (non-critical)"

          # 2. Bing Sitemap ping
          echo "=== Pinging Bing with sitemap ==="
          curl -s --max-time 10 "https://www.bing.com/ping?sitemap=${SITEMAP_URL}" || echo "Bing ping failed (non-critical)"

          # 3. IndexNow — submit today's new blog post URLs
          echo "=== Submitting new blog URLs via IndexNow ==="
          python3 - <<'EOF'
          import json, urllib.request, urllib.error
          from pathlib import Path
          from datetime import datetime, timezone

          SITE_URL = "https://global-trend-map-web.vercel.app"
          INDEXNOW_KEY = "7f3a2b9c4e1d8f6a5c2b0e7d4f9a1c3e"
          today = datetime.now(timezone.utc).strftime('%Y-%m-%d')

          try:
              idx = json.loads(Path('public/data/posts-index.json').read_text(encoding='utf-8'))
              posts = idx.get('posts', idx) if isinstance(idx, dict) else idx
              # Only submit posts created today
              new_urls = [
                  f"{SITE_URL}/blog/{p['slug']}"
                  for p in posts
                  if p.get('date', '')[:10] == today
              ]
              if not new_urls:
                  print("No new posts today — skipping IndexNow submission")
              else:
                  payload = json.dumps({
                      "host": "global-trend-map-web.vercel.app",
                      "key": INDEXNOW_KEY,
                      "keyLocation": f"{SITE_URL}/{INDEXNOW_KEY}.txt",
                      "urlList": new_urls,
                  }).encode()
                  req = urllib.request.Request(
                      "https://api.indexnow.org/indexnow",
                      data=payload,
                      headers={"Content-Type": "application/json; charset=utf-8"},
                      method="POST",
                  )
                  with urllib.request.urlopen(req, timeout=10) as res:
                      print(f"IndexNow response: {res.status} — submitted {len(new_urls)} URLs")
                      for u in new_urls:
                          print(f"  {u}")
          except urllib.error.HTTPError as e:
              print(f"IndexNow HTTP error: {e.code} {e.reason} (non-critical)")
          except Exception as e:
              print(f"IndexNow failed: {e} (non-critical)")
          EOF

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error title=Blog Generation Failed::The blog post generation pipeline failed. Check generate_blog.py logs."
